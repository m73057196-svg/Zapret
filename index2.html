<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bleach Clicker</title>
    <link rel="stylesheet" href="style2.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Bleach Clicker</h1>
        
        <div class="stats">
            <div>Духовная сила: <span id="spiritual-power">0</span></div>
            <div>Уровень: <span id="level">1</span></div>
            <div>До следующего уровня: <span id="next-level">100</span></div>
        </div>

        <div class="game-area">
            <img src="Ichigo.jpg" alt="Ичиго Куросаки" id="character" class="character">
            
            <button id="click-btn" class="click-btn">Атаковать!</button>
        </div>

        <div class="upgrades">
            <h2>Улучшения</h2>
            <button id="upgrade-btn" class="upgrade-btn">
                Улучшить силу (+1 за клик)<br>
                Стоимость: <span id="upgrade-cost">10</span> духовной силы
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
